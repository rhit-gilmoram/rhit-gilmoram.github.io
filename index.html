<html>
	<head>
		<title>Home - Alex Gilmore</title>
		<link href="styles.css" rel="stylesheet">
	</head>
<body>
	<header class="centered" id="navigationBar"></header>
	<main>
		<h1>
			Alex Gilmore
		</h1>
		<img src="headshot.png" alt="Profile picture">
		<section>
			<p>Welcome to my Portfolio website! To explore further, follow the links in the navigation bar at the top or the icons below.</p>
			<p>Feel free to leave a like!  -->  <button id="likeButton">Like!</button> <span id="likes">0</span></p>
			<div class="centered box">
				<!-- Citation for interesting JS feature: images as links
				The website shows <img> nested inside <a>, but I decided to use buttons to incorporate JS
				https://www.tutorialpedia.org/blog/anchor-pictures-html-css/
				The listeners for these buttons are in script.js -->
				<button id="resumeButton">
					<img src="resume_graphic.jpg" alt="Resume graphic">
				</button>
				<h2>Resume</h2>
				<p>Skills, Work, Education</p>
			</div>
			<div class="centered box">
				<button id="portfolioButton">
					<img src="portfolio_graphic.png" alt="Portfolio graphic">
				</button>
				<h2>Portfolio</h2>
				<p>List of Projects</p>
			</div>
		</section>
	</main>
	<div id="footer"></div>
	<script src="script.js"></script>
	
</body>

</html>
